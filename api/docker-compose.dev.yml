services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: emailplatform-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./dev/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (services push here)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint exposed by collector
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: emailplatform-loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./dev/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: emailplatform-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    user: "0:0"
    volumes:
      - ./dev/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP query
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: emailplatform-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./dev/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: emailplatform-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./dev/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  loki_data:
  tempo_data:
  prometheus_data:
  grafana_data:
